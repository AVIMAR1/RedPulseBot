<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedPulse // ACCESS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff41;
            border-radius: 4px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1), inset 0 0 30px rgba(0, 255, 65, 0.05);
            animation: containerGlow 3s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 65, 0.1), inset 0 0 30px rgba(0, 255, 65, 0.05); }
            50% { box-shadow: 0 0 60px rgba(0, 255, 65, 0.2), inset 0 0 40px rgba(0, 255, 65, 0.1); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            letter-spacing: 4px;
            animation: glitch 2s infinite;
        }

        .logo .subtitle {
            font-size: 11px;
            color: #00cc33;
            margin-top: 5px;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 0 0 20px rgba(0, 255, 65, 0.5); transform: translate(0); }
            92% { text-shadow: -2px 0 #ff0040, 2px 0 #00ff41; transform: translate(-2px, 1px); }
            94% { text-shadow: 2px 0 #ff0040, -2px 0 #00ff41; transform: translate(2px, -1px); }
            96% { text-shadow: 0 0 20px rgba(0, 255, 65, 0.5); transform: translate(0); }
        }

        .terminal-line {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .terminal-line .prompt {
            color: #00cc33;
            margin-right: 8px;
            white-space: nowrap;
        }

        .terminal-line input {
            flex: 1;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .terminal-line input:focus {
            border-color: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            background: rgba(0, 255, 65, 0.1);
        }

        .terminal-line input::placeholder {
            color: rgba(0, 255, 65, 0.3);
        }

        .btn-hack {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-hack:hover {
            background: rgba(0, 255, 65, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .btn-hack::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-hack:hover::before {
            left: 100%;
        }

        .error-msg {
            background: rgba(255, 0, 64, 0.1);
            border: 1px solid rgba(255, 0, 64, 0.3);
            color: #ff0040;
            padding: 10px;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
            animation: errorPulse 1s ease-in-out infinite;
        }

        @keyframes errorPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-bar {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            font-size: 10px;
            color: rgba(0, 255, 65, 0.5);
            display: flex;
            justify-content: space-between;
        }

        .scan-line {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.3);
            z-index: 100;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #00ff41;
            animation: blink 0.8s infinite;
            margin-left: 2px;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="scan-line"></div>

    <div class="login-container">
        <div class="logo">
            <h1>REDPULSE</h1>
            <div class="subtitle">// ADMIN TERMINAL v2.0</div>
        </div>

        {% if error %}
        <div class="error-msg">⚠ ACCESS DENIED: {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="terminal-line">
                <span class="prompt">user@root:~$</span>
                <input type="text" name="username" placeholder="username" required autocomplete="off" autofocus>
            </div>
            <div class="terminal-line">
                <span class="prompt">pass@root:~$</span>
                <input type="password" name="password" placeholder="password" required autocomplete="off">
            </div>
            <button type="submit" class="btn-hack">[ INITIALIZE ACCESS ]</button>
        </form>

        <div class="status-bar">
            <span>SYS: ONLINE</span>
            <span>ENC: AES-256</span>
            <span id="clock"></span>
        </div>
    </div>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
